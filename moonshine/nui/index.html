<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="panel">
            <h2 id="title">Mash Tub</h2>

            <div class="stat">
                <span>Temperature</span>
                <span id="temp">0°C</span>
            </div>

            <input type="range" id="heat" min="0" max="1" step="0.01">

            <div id="progress"></div>
            <div id="feedback"></div>

            <button id="close">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
